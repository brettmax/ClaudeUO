name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build ModernUO
        run: dotnet build server/ModernUO.slnx -c Release

      - name: Build ClaudeUO.Admin overlay
        run: dotnet build shard/ClaudeUO.Admin/ClaudeUO.Admin.csproj -c Release

      - name: Lint shell scripts
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck
          shellcheck automation/*.sh deploy/*.sh
